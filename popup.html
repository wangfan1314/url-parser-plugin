<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="appTitle">URL Parameter Parser</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 data-i18n="appTitle">URL Parameter Parser</h1>
      <div class="header-actions">
        <button id="refreshBtn" class="btn btn-secondary" data-i18n-title="refreshUrl" title="Refresh URL">🔄</button>
        <button id="clearBtn" class="btn btn-secondary" data-i18n-title="clearAll" title="Clear">🗑️</button>
      </div>
    </header>

    <div class="url-section">
      <label for="urlInput" data-i18n="currentUrl">Current URL:</label>
      <input type="text" id="urlInput" data-i18n-placeholder="urlPlaceholder" placeholder="Enter or paste a URL" />
      <button id="parseBtn" class="btn btn-primary" data-i18n="parseBtn">Parse</button>
    </div>

    <div class="search-section">
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 Search parameters..." />
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="params" data-i18n="tabParams">Parameters</button>
      <button class="tab-btn" data-tab="headers" data-i18n="tabHeaders">Headers</button>
    </div>

    <!-- Parameters Tab -->
    <div id="paramsTab" class="tab-content active">
      <div class="params-list" id="paramsList">
        <div class="empty-state" data-i18n="emptyParams">Enter a URL and click Parse to start</div>
      </div>
      <div class="actions">
        <button id="addParamBtn" class="btn btn-primary" data-i18n="addParam">+ Add Parameter</button>
        <button id="applyParamsBtn" class="btn btn-success" data-i18n="applyParams">Apply Parameters</button>
      </div>
    </div>

    <!-- Headers Tab -->
    <div id="headersTab" class="tab-content">
      <div class="headers-list" id="headersList">
        <div class="empty-state" data-i18n="emptyHeaders">No Headers yet</div>
      </div>
      <div class="actions">
        <button id="addHeaderBtn" class="btn btn-primary" data-i18n="addHeader">+ Add Header</button>
        <button id="exportHeadersBtn" class="btn btn-secondary" data-i18n="exportFile">📥 Export</button>
        <button id="importHeadersBtn" class="btn btn-secondary" data-i18n="importFile">📤 Import</button>
        <button id="applyHeadersBtn" class="btn btn-success" data-i18n="applyHeaders">Apply Headers</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
